<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rodinný plánovač</title>

<!-- 🔤 Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- 📅 Flatpickr kalendář -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 20px;

  background: linear-gradient(-45deg, #fceabb, #f8b500, #e0f7fa, #fce4ec);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🎈 animované pozadí */
.floating {
  position: fixed;
  font-size: 28px;
  opacity: 0.15;
  animation: float 20s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) }
  100% { transform: translateY(-10vh) }
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.92);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

h1 { text-align: center; }
h2 { margin-top: 25px; }

input, select {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
  transition: 0.2s;
}

button:hover { transform: scale(1.05); }

.btn-add { background: #007bff; color: white; }
.btn-done { background: #28a745; color: white; }
.btn-edit { background: #ffc107; }
.btn-delete { background: #dc3545; color: white; }
.btn-clear { background: #6c757d; color: white; width: 100%; }

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.overdue {
  color: red;
  font-weight: bold;
}

.small {
  font-size: 0.85em;
  color: #666;
}

/* 📅 styl kalendáře */
.flatpickr-calendar {
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- 🎈 animované "rodinné" pozadí -->
<div class="floating" style="left:10%; animation-delay:0s;">👨‍👩‍👧</div>
<div class="floating" style="left:30%; animation-delay:5s;">👶</div>
<div class="floating" style="left:50%; animation-delay:2s;">🏡</div>
<div class="floating" style="left:70%; animation-delay:8s;">🧸</div>
<div class="floating" style="left:85%; animation-delay:3s;">🚲</div>

<div class="container">

<h1>👨‍👩‍👧 Rodinný plánovač</h1>

<h2>➕ Přidat úkol</h2>

<input id="task" placeholder="📝 Co je potřeba udělat?">
<input id="deadline" placeholder="Vyber datum">

<select id="author">
  <option>👨 Honzule</option>
  <option>👩 Marťule</option>
</select>

<button class="btn-add" onclick="addTask()">Přidat</button>

<h2>📋 Aktivní úkoly</h2>
<div id="active"></div>

<h2>✅ Splněné úkoly</h2>
<div id="done"></div>

<button class="btn-clear" onclick="clearDone()">🧹 Vymazat splněné</button>

</div>

<!-- 📅 Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, updateDoc, doc,
  deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 DOPLŇ SVŮJ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA7hYyRppxwh3HA_iLp2oQWfTzS-nasNv8",
  authDomain: "cadovi---domacnost.firebaseapp.com",
  projectId: "cadovi---domacnost"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksCol = collection(db, "tasks");

// 📅 aktivace kalendáře
flatpickr("#deadline", {
  dateFormat: "Y-m-d",
  minDate: "today"
});

// ➕ Přidání
window.addTask = function() {
  const name = document.getElementById("task").value;
  const deadline = document.getElementById("deadline").value;
  const author = document.getElementById("author").value;

  if (!name) return;

  addDoc(tasksCol, {
    name,
    author,
    created: new Date().toLocaleString(),
    deadline,
    done: false,
    doneAt: null
  });

  document.getElementById("task").value = "";
}

// ✅ Splněno
window.markDone = function(id) {
  updateDoc(doc(db, "tasks", id), {
    done: true,
    doneAt: new Date().toLocaleString()
  });
}

// ✏️ Editace
window.editTask = async function(id, oldName) {
  const newName = prompt("Upravit úkol:", oldName);
  if (newName) {
    await updateDoc(doc(db, "tasks", id), {
      name: newName
    });
  }
}

// 🗑️ Smazání
window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
}

// 🧹 Vymazat splněné
window.clearDone = async function() {
  const snapshot = await getDocs(tasksCol);
  snapshot.forEach(async (docSnap) => {
    if (docSnap.data().done) {
      await deleteDoc(doc(db, "tasks", docSnap.id));
    }
  });
}

// 🔄 Render
onSnapshot(tasksCol, (snapshot) => {
  const active = document.getElementById("active");
  const done = document.getElementById("done");

  active.innerHTML = "";
  done.innerHTML = "";

  snapshot.forEach(docSnap => {
    const t = docSnap.data();
    const div = document.createElement("div");
    div.className = "card";

    const isOverdue = t.deadline && new Date(t.deadline) < new Date();

    if (!t.done) {
      div.innerHTML = `
        <strong>${t.name}</strong><br>
        <span class="small">${t.author} | 📅 ${t.deadline || "-"}</span>
      `;

      if (isOverdue) div.classList.add("overdue");

      const btnDone = document.createElement("button");
      btnDone.innerText = "✔";
      btnDone.className = "btn-done";
      btnDone.onclick = () => markDone(docSnap.id);

      const btnEdit = document.createElement("button");
      btnEdit.innerText = "✏️";
      btnEdit.className = "btn-edit";
      btnEdit.onclick = () => editTask(docSnap.id, t.name);

      const btnDelete = document.createElement("button");
      btnDelete.innerText = "🗑";
      btnDelete.className = "btn-delete";
      btnDelete.onclick = () => deleteTask(docSnap.id);

      div.appendChild(btnDone);
      div.appendChild(btnEdit);
      div.appendChild(btnDelete);

      active.appendChild(div);

    } else {
      div.innerHTML = `
        <strong>✅ ${t.name}</strong><br>
        <span class="small">${t.author} | splněno: ${t.doneAt}</span>
      `;
      done.appendChild(div);
    }
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Úkoly</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn-add {
      background: #007bff;
      color: white;
    }

    .btn-done {
      background: #28a745;
      color: white;
    }

    .btn-edit {
      background: #ffc107;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-clear {
      background: #6c757d;
      color: white;
      width: 100%;
    }

    .task-info {
      margin-bottom: 5px;
    }

    .overdue {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="container">

<h2>Přidat úkol</h2>

<input id="task" placeholder="Název úkolu">
<input type="date" id="deadline">

<select id="author">
  <option>Já</option>
  <option>Manželka</option>
</select>

<button class="btn-add" onclick="addTask()">Přidat</button>

<h2>Aktivní úkoly</h2>
<div id="active"></div>

<h2>Splněné úkoly</h2>
<div id="done"></div>

<button class="btn-clear" onclick="clearDone()">Vymazat splněné</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, updateDoc, doc,
  deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 DOPLŇ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA7hYyRppxwh3HA_iLp2oQWfTzS-nasNv8",
  authDomain: "cadovi---domacnost.firebaseapp.com",
  projectId: "cadovi---domacnost"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksCol = collection(db, "tasks");

// ➕ Přidání
window.addTask = function() {
  const name = document.getElementById("task").value;
  const deadline = document.getElementById("deadline").value;
  const author = document.getElementById("author").value;

  if (!name) return;

  addDoc(tasksCol, {
    name,
    author,
    created: new Date().toLocaleString(),
    deadline,
    done: false,
    doneAt: null
  });

  document.getElementById("task").value = "";
}

// ✅ Splněno
window.markDone = function(id) {
  updateDoc(doc(db, "tasks", id), {
    done: true,
    doneAt: new Date().toLocaleString()
  });
}

// ✏️ Editace
window.editTask = async function(id, oldName) {
  const newName = prompt("Upravit název:", oldName);
  if (newName) {
    await updateDoc(doc(db, "tasks", id), {
      name: newName
    });
  }
}

// 🗑️ Smazání jednoho úkolu
window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
}

// 🧹 Vymazat splněné
window.clearDone = async function() {
  const snapshot = await getDocs(tasksCol);

  snapshot.forEach(async (docSnap) => {
    if (docSnap.data().done) {
      await deleteDoc(doc(db, "tasks", docSnap.id));
    }
  });
}

// 🔄 Render
onSnapshot(tasksCol, (snapshot) => {
  const active = document.getElementById("active");
  const done = document.getElementById("done");

  active.innerHTML = "";
  done.innerHTML = "";

  snapshot.forEach(docSnap => {
    const t = docSnap.data();
    const div = document.createElement("div");
    div.className = "card";

    const isOverdue = t.deadline && new Date(t.deadline) < new Date();

    if (!t.done) {
      div.innerHTML = `
        <div class="task-info ${isOverdue ? 'overdue' : ''}">
          <strong>${t.name}</strong><br>
          ${t.author} | do: ${t.deadline || "-"}
        </div>
      `;

      const btnDone = document.createElement("button");
      btnDone.innerText = "✔ Splněno";
      btnDone.className = "btn-done";
      btnDone.onclick = () => markDone(docSnap.id);

      const btnEdit = document.createElement("button");
      btnEdit.innerText = "✏️";
      btnEdit.className = "btn-edit";
      btnEdit.onclick = () => editTask(docSnap.id, t.name);

      const btnDelete = document.createElement("button");
      btnDelete.innerText = "🗑";
      btnDelete.className = "btn-delete";
      btnDelete.onclick = () => deleteTask(docSnap.id);

      div.appendChild(btnDone);
      div.appendChild(btnEdit);
      div.appendChild(btnDelete);

      active.appendChild(div);

    } else {
      div.innerHTML = `
        <strong>${t.name}</strong><br>
        ${t.author} | splněno: ${t.doneAt}
      `;
      done.appendChild(div);
    }
  });
});
</script>

</body>
</html>

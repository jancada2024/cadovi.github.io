<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Úkoly</title>
</head>
<body>

<h2>Přidat úkol</h2>

<input id="task" placeholder="Název úkolu">
<input type="date" id="deadline">

<select id="author">
  <option>Honzule</option>
  <option>Marťule</option>
</select>

<button onclick="addTask()">Přidat</button>

<h2>Aktivní úkoly</h2>
<ul id="active"></ul>

<h2>Splněné úkoly</h2>
<ul id="done"></ul>

<button onclick="clearDone()">Vymazat splněné</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, updateDoc, doc,
  deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 SEM VLOŽ SVŮJ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA7hYyRppxwh3HA_iLp2oQWfTzS-nasNv8",
  authDomain: "cadovi---domacnost.firebaseapp.com",
  projectId: "cadovi---domacnost"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tasksCol = collection(db, "tasks");

// ➕ Přidání úkolu
window.addTask = function() {
  const name = document.getElementById("task").value;
  const deadline = document.getElementById("deadline").value;
  const author = document.getElementById("author").value;

  if (!name) return;

  addDoc(tasksCol, {
    name,
    author,
    created: new Date().toLocaleString(),
    deadline,
    done: false,
    doneAt: null
  });

  document.getElementById("task").value = "";
}

// ✅ Označit jako splněné
window.markDone = function(id) {
  const ref = doc(db, "tasks", id);
  updateDoc(ref, {
    done: true,
    doneAt: new Date().toLocaleString()
  });
}

// 🗑️ Vymazat splněné
window.clearDone = async function() {
  const snapshot = await getDocs(tasksCol);

  snapshot.forEach(async (docSnap) => {
    const t = docSnap.data();
    if (t.done) {
      await deleteDoc(doc(db, "tasks", docSnap.id));
    }
  });
}

// 🔄 Načítání a vykreslení
onSnapshot(tasksCol, (snapshot) => {
  const active = document.getElementById("active");
  const done = document.getElementById("done");

  active.innerHTML = "";
  done.innerHTML = "";

  snapshot.forEach(docSnap => {
    const t = docSnap.data();
    const li = document.createElement("li");

    if (!t.done) {
      li.innerHTML = `${t.name} - ${t.author} (do: ${t.deadline})`;

      const btn = document.createElement("button");
      btn.innerText = "Splněno";
      btn.onclick = () => markDone(docSnap.id);

      li.appendChild(btn);
      active.appendChild(li);
    } else {
      li.innerHTML = `${t.name} - ${t.author} (splněno: ${t.doneAt})`;
      done.appendChild(li);
    }
  });
});
</script>

</body>
</html>
